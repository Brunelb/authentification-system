{% extends 'base.html' %}
{% block content %}

<h1>s'enregistrer ici</h1>

{% if messages %}
    {% for message in messages %}
        <div class="alert alert-info">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<form method="post" action="{% url 'register' %}">
    {% csrf_token %}
    
    <label for="username">username</label>
    <input type="text" name="username" id="username" placeholder="entrer votre username" required>
    <br>

    <label for="firstname">firstname</label>
    <input type="text" name="firstname" id="firstname" placeholder="entrer votre firstname" required>
    <br>

    <label for="lastname">lastname</label>
    <input type="text" name="lastname" id="lastname" placeholder="entrer votre lastname" required>
    <br>

    <label for="email">email</label>
    <input type="email" name="email" id="email" placeholder="entrer votre email" required>
    <br>

    <label for="password">password</label>
    <input type="password" name="password" id="password" placeholder="entrer votre password" required>
    <br>

    <label for="password1">password1</label>
    <input type="password" name="password1" id="password1" placeholder="entrer votre password confirmer" required>
    <br>

    <button type="submit">Enregistrer</button>
</form>

{% endblock %}
